version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: llm_eval
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/llm_eval
    depends_on:
      - postgres
    env_file:
      - .env

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port 8501
    ports:
      - "8501:8501"
    depends_on:
      - api
    env_file:
      - .env

volumes:
  postgres_data: